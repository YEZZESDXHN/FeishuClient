[loggers]
keys=root,FeishuClient,Lark,apscheduler

[handlers]
keys=consoleHandler,timedRotatingFileHandler,nullHandler

[formatters]
keys=simpleFormatter

[logger_root]
level=DEBUG
handlers=consoleHandler

[logger_FeishuClient]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
# handlers=timedRotatingFileHandler
qualname=FeishuClient
propagate=0

[logger_apscheduler]
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
# handlers=timedRotatingFileHandler
qualname=apscheduler
propagate=0

[logger_Lark]
# level=INFO
level=DEBUG
handlers=consoleHandler,timedRotatingFileHandler
# handlers=timedRotatingFileHandler,consoleHandler
qualname=Lark
propagate=0

[handler_consoleHandler]
class=StreamHandler
formatter=simpleFormatter
args=(sys.stdout,)

[handler_timedRotatingFileHandler]
level=DEBUG
class=handlers.TimedRotatingFileHandler
formatter=simpleFormatter
args=('./logs/FeishuClient.log','midnight', 1, 7, 'utf-8')

[handler_nullHandler]
class=NullHandler
formatter=simpleFormatter
args=()


[formatter_simpleFormatter]
format=%(asctime)s [%(levelname)s] %(name)s %(filename)s %(lineno)d: %(message)s
datefmt=%Y-%m-%d %H:%M:%S

